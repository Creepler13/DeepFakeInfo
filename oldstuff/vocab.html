<!DOCTYPE html>
<html lang="en">

<head>
	<link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Vocabulary</title>
</head>


<style>

</style>

<body>
	<div class="largeText" id="textC"></div>
</body>
<script>

	function contentToHtml(text) {
		return text
			.split('\n\n')
			.map(paragraph => `<p>${paragraph.replaceAll("\n", "<br>")}</p>`)
			.join('')
	}

	fetch("./media/vocab.txt").then(e => e.text().then(e => {

		document.querySelector("#textC").innerHTML = contentToHtml(e)

	}))

</script>

</html>
